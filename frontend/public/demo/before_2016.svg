<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8b07e"/>
      <stop offset="55%" stop-color="#bda06c"/>
      <stop offset="100%" stop-color="#a98f5c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sand)"/>
  <!-- desert texture -->
  <g opacity="0.18" fill="#8a744a">
    <ellipse cx="140" cy="90" rx="90" ry="14"/>
    <ellipse cx="430" cy="180" rx="130" ry="18"/>
    <ellipse cx="650" cy="80" rx="80" ry="12"/>
    <ellipse cx="240" cy="320" rx="120" ry="16"/>
    <ellipse cx="600" cy="400" rx="150" ry="20"/>
    <ellipse cx="90" cy="440" rx="70" ry="11"/>
  </g>
  <!-- dry wadi -->
  <path d="M-10,260 C150,230 260,300 420,270 S700,210 810,250" fill="none"
        stroke="#9b8254" stroke-width="16" opacity="0.45"/>
  <path d="M-10,260 C150,230 260,300 420,270 S700,210 810,250" fill="none"
        stroke="#8a744a" stroke-width="4" opacity="0.5"/>
  <!-- dirt track -->
  <path d="M120,510 C200,380 330,330 520,300 S760,260 820,240" fill="none"
        stroke="#a08a5e" stroke-width="6" stroke-dasharray="14 10" opacity="0.6"/>
  <!-- tiny old plot -->
  <rect x="585" y="330" width="46" height="38" fill="#7c8a4f" opacity="0.55" rx="3"/>
  <text x="20" y="40" font-family="monospace" font-size="22" fill="#473a1f" opacity="0.85">AZRAQ · 2016</text>
  <text x="780" y="478" text-anchor="end" font-family="monospace" font-size="20" fill="#473a1f" opacity="0.7">DEMO DATA — بيانات تجريبية</text>
</svg>
